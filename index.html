<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>城市线路图生成器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
h1 {
  font-size: 24px;
  font-weight: 300;
  margin-bottom: 24px;
  letter-spacing: 2px;
}
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
}
input {
  padding: 10px 16px;
  font-size: 16px;
  border: 1px solid #444;
  border-radius: 4px;
  background: #2a2a2a;
  color: #fff;
  width: 260px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: #888; }
button {
  padding: 10px 24px;
  font-size: 16px;
  border: none;
  border-radius: 4px;
  background: #fff;
  color: #1a1a1a;
  cursor: pointer;
  font-weight: 500;
  transition: opacity 0.2s;
}
button:hover { opacity: 0.85; }
button:disabled { opacity: 0.4; cursor: not-allowed; }
#status {
  margin-bottom: 16px;
  font-size: 14px;
  color: #aaa;
  height: 20px;
}
#error {
  margin-bottom: 16px;
  font-size: 14px;
  color: #ff6b6b;
  height: 20px;
}
canvas {
  border: 1px solid #333;
  background: #000;
}
</style>
</head>
<body>
<h1>城市线路图生成器</h1>
<div class="controls">
  <input type="text" id="cityInput" placeholder="输入城市名称，如 Beijing" />
  <button id="submitBtn">生成</button>
</div>
<div id="status"></div>
<div id="error"></div>
<canvas id="canvas" width="800" height="800"></canvas>

<script>
const cityInput = document.getElementById('cityInput');
const submitBtn = document.getElementById('submitBtn');
const status = document.getElementById('status');
const error = document.getElementById('error');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function setStatus(msg) { status.textContent = msg; }
function setError(msg) { error.textContent = msg; }
function clearMessages() { setStatus(''); setError(''); }

cityInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitBtn.click();
});

submitBtn.addEventListener('click', async () => {
  const city = cityInput.value.trim();
  if (!city) { setError('请输入城市名称'); return; }

  clearMessages();
  submitBtn.disabled = true;

  try {
    setStatus('正在查询城市坐标...');
    const bbox = await geocodeCity(city);

    setStatus('正在获取道路数据...');
    const roads = await fetchRoads(bbox);

    if (roads.length === 0) {
      setError('未找到该区域的道路数据');
      return;
    }

    setStatus('正在渲染线路图...');
    renderRoads(roads);
    setStatus(`完成 — 共渲染 ${roads.length} 条道路`);
  } catch (err) {
    setError(err.message);
    setStatus('');
  } finally {
    submitBtn.disabled = false;
  }
});

async function geocodeCity(city) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`;
  const res = await fetch(url, {
    headers: { 'Accept': 'application/json' }
  });

  if (!res.ok) throw new Error('地理编码服务请求失败，请稍后重试');

  const data = await res.json();
  if (!data || data.length === 0) throw new Error(`未找到城市「${city}」，请检查输入`);

  const place = data[0];
  const bb = place.boundingbox;
  return {
    south: parseFloat(bb[0]),
    north: parseFloat(bb[1]),
    west: parseFloat(bb[2]),
    east: parseFloat(bb[3])
  };
}

async function fetchRoads(bbox) {
  const query = `
    [out:json][timeout:60];
    (
      way["highway"~"^(motorway|trunk|primary|secondary|tertiary|motorway_link|trunk_link|primary_link|secondary_link|tertiary_link)$"](${bbox.south},${bbox.west},${bbox.north},${bbox.east});
    );
    out body;
    >;
    out skel qt;
  `;

  const res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'data=' + encodeURIComponent(query)
  });

  if (!res.ok) {
    if (res.status === 429) throw new Error('请求过于频繁，请稍后再试');
    if (res.status === 504) throw new Error('数据量过大导致超时，请尝试较小的城市');
    throw new Error('道路数据服务请求失败，请稍后重试');
  }

  const data = await res.json();
  const nodes = {};
  for (const el of data.elements) {
    if (el.type === 'node') {
      nodes[el.id] = { lat: el.lat, lon: el.lon };
    }
  }

  const roads = [];
  for (const el of data.elements) {
    if (el.type === 'way' && el.nodes) {
      const coords = [];
      for (const nid of el.nodes) {
        if (nodes[nid]) coords.push(nodes[nid]);
      }
      if (coords.length >= 2) roads.push(coords);
    }
  }

  return roads;
}

function renderRoads(roads) {
  const W = canvas.width;
  const H = canvas.height;
  const padding = 40;

  let minLat = Infinity, maxLat = -Infinity;
  let minLon = Infinity, maxLon = -Infinity;

  for (const road of roads) {
    for (const p of road) {
      if (p.lat < minLat) minLat = p.lat;
      if (p.lat > maxLat) maxLat = p.lat;
      if (p.lon < minLon) minLon = p.lon;
      if (p.lon > maxLon) maxLon = p.lon;
    }
  }

  const latRange = maxLat - minLat;
  const lonRange = maxLon - minLon;

  if (latRange === 0 || lonRange === 0) {
    setError('数据范围异常，无法渲染');
    return;
  }

  const midLat = (minLat + maxLat) / 2;
  const cosLat = Math.cos(midLat * Math.PI / 180);
  const adjustedLonRange = lonRange * cosLat;

  const drawW = W - padding * 2;
  const drawH = H - padding * 2;

  const scaleX = drawW / adjustedLonRange;
  const scaleY = drawH / latRange;
  const scale = Math.min(scaleX, scaleY);

  const renderedW = adjustedLonRange * scale;
  const renderedH = latRange * scale;
  const offsetX = padding + (drawW - renderedW) / 2;
  const offsetY = padding + (drawH - renderedH) / 2;

  function project(lat, lon) {
    const x = (lon - minLon) * cosLat * scale + offsetX;
    const y = (maxLat - lat) * scale + offsetY;
    return [x, y];
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (const road of roads) {
    ctx.beginPath();
    const [sx, sy] = project(road[0].lat, road[0].lon);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < road.length; i++) {
      const [x, y] = project(road[i].lat, road[i].lon);
      ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}
</script>
</body>
</html>
